server.port=8084
spring.application.name=EasyPublish
spring.thymeleaf.enabled=true

app.cors.allowed-origins=http://localhost:5173,https://izipublish.com,https://cars.izipublish.com
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*

# Extracted from hardcoded values in services/config:
app.node.binary=node
app.node.items-script=getItems.js
app.node.directory=./node
app.node.cli-dir=${EASY_PUBLISH_CLI_DIR:}
app.iota.network=mainnet
# Optional comma-separated RPC URLs. If empty, SDK default fullnode URL is used.
app.iota.rpc-urls=
app.iota.rpc-attempts-per-url=2
app.iota.rpc-retry-delay-ms=400
app.iota.node-fetch-max-attempts=3
app.iota.node-fetch-retry-delay-ms=1000

# On-chain sync scheduler (non-overlapping runs)
app.onchain-sync.enabled=true
app.onchain-sync.initial-delay-ms=15000
app.onchain-sync.fixed-delay-ms=60000
app.onchain-sync.smart-contract-id=0xb0927f142487c66708ec3cf978dbe45da94ccede7944de7a13889efa01f7dc67
app.onchain-sync.container-chain-id=0xc225e0fc9f648d95e90e8b0bbb0aecf4122c90f7c8e9f137b64603685a796266
app.onchain-sync.update-chain-id=0x6c5215f9827413e25fad5f746e01c50e523caf704d65d4c7db35ddd38a8de30b
app.onchain-sync.data-item-chain-id=0x21e241879bc5dad7046d742e06f60ccd8e2b66b5609a48d8d25714e4253166f2
app.onchain-sync.data-item-verification-chain-id=0x1cfbe6f207b6f3851ac37d879a47f6a3262514d4b809c5f15cc971c62e2929b9

# Extracted from hardcoded websocket paths/schedule:
app.websocket.broker-prefix=/topic
app.websocket.app-prefix=/app
app.websocket.endpoint=/ws-sync
app.websocket.sync-topic=/topic/sync-status
app.sync.status-push-rate-ms=5000
app.easy-publish.offchain-index-enabled=false
app.easy-publish.offchain-index-ms=60000
app.easy-publish.offchain-index-initial-delay-ms=15000

# Extracted from hardcoded API limits/defaults:
app.follow.max-per-user=1000
app.domain.default-public=izipublish.com

# ERP integration module (off-chain extension, independent erp_* tables)
app.erp.api.enabled=false
app.erp.api.allow-owner-address-auth=false
app.erp.cli.binary=node
app.erp.cli.script=${ERP_CLI_SCRIPT:}
app.erp.cli.working-directory=${ERP_CLI_WORKDIR:.}
app.erp.cli.default-network=mainnet
app.erp.cli.private-key-env-var=IOTA_PRIVATE_KEY
app.erp.cli.timeout-ms=180000

# Optional override
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
server.servlet.context-path=/izipublish
sync.chain.last=0x6c5215f9827413e25fad5f746e01c50e523caf704d65d4c7db35ddd38a8de30b
sync.chain.DataItem=0x21e241879bc5dad7046d742e06f60ccd8e2b66b5609a48d8d25714e4253166f2

spring.datasource.url=jdbc:postgresql://localhost:5432/devdb
spring.datasource.username=dev
spring.datasource.password=dev
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off
logging.level.org.hibernate.orm.jdbc.bind=off
