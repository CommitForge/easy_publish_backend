server.port=8084
spring.application.name=EasyPublish
spring.thymeleaf.enabled=true

app.cors.allowed-origins=http://localhost:5173,https://izipublish.com,https://cars.izipublish.com
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*

# Extracted from hardcoded values in services/config:
app.node.binary=node
app.node.items-script=getItems.js
app.node.directory=./node

# Extracted from hardcoded websocket paths/schedule:
app.websocket.broker-prefix=/topic
app.websocket.app-prefix=/app
app.websocket.endpoint=/ws-sync
app.websocket.sync-topic=/topic/sync-status
app.sync.status-push-rate-ms=5000
app.easy-publish.offchain-index-ms=60000
app.easy-publish.offchain-index-initial-delay-ms=15000

# Extracted from hardcoded API limits/defaults:
app.follow.max-per-user=1000
app.domain.default-public=izipublish.com

# Optional override
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
server.servlet.context-path=/izipublish
sync.chain.last=0xeaaae67bd7787419740408d6e170c446005fb7be7f3daec4509eef97c589290d
sync.chain.DataItem=0xa221e3453d696c2e741c36265171691b451cecbc3088087cbe7bbb8dae606c9d

spring.datasource.url=jdbc:postgresql://localhost:5432/devdb
spring.datasource.username=dev
spring.datasource.password=dev
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
